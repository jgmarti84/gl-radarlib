services:
  genpro25-rma1:
    command: [ "tail", "-f", "/dev/null" ]
    environment:
      PYTHONPATH: "/workspace/src:/workspace/app:${PYTHONPATH}"
      # volumes:
      # - ./tests:/workspace/tests
      # - ./examples:/workspace/examples
      # - ./scripts:/workspace/scripts
      # - ./src:/workspace/src
    working_dir: /workspace

  # ==========================================================================
  # TESTING SERVICE (devcontainer only)
  # ==========================================================================
  tests:
    build:
      context: ./
      dockerfile: tests/Dockerfile
    container_name: radarlib_tests
    environment:
      PYTHONPATH: "/app/src:/app/app:${PYTHONPATH}"
      GENPRO25_CONFIG: "/app/app/genpro25.yml"
    volumes:
      - ./tests:/app/tests
      - ./examples:/app/examples
      - ./src:/app/src
      - ./app:/app/app
      - ./genpro25.yml:/app/app/genpro25.yml:ro # Read-only volume for genpro25 configuration
    command: [ "tail", "-f", "/dev/null" ]
