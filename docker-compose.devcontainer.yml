  # ==========================================================================
  # TESTING SERVICE (devcontainer only)
  # ==========================================================================
  tests:
    build:
      context: ./
      dockerfile: tests/Dockerfile
    container_name: radarlib_tests
    environment:
      PYTHONPATH: "/app/src:/app/app:${PYTHONPATH}"
      GENPRO25_CONFIG: "/app/app/genpro25.yml"
    volumes:
      - ./tests:/app/tests
      - ./examples:/app/examples
      - ./src:/app/src
      - ./app:/app/app
      - ./genpro25.yml:/app/app/genpro25.yml:ro # Read-only volume for genpro25 configuration
      # Mount tops_and_cores output dir so GeoJSON products written by the
      # product daemon are visible on the host and persist across container restarts.
      - ./tests/data/tops_and_cores:/app/tops_and_cores
command: [ "tail", "-f", "/dev/null" ]
