services:
  # Radar data processing service
  genpro25-rma1:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    container_name: genpro25-rma1
    volumes:
      - ../product_output/RMA1:/workspace/app/product_output/RMA1
      - ../tops_and_cores/RMA1:/workspace/app/tops_and_cores/RMA1 # Mount tops_and_cores output dir for RMA1
      - ../logs/RMA1:/workspace/app/logs/RMA1
      - ../geometry/RMA1:/workspace/app/data/geometries
      - ./genpro25.yml:/workspace/app/genpro25.yml:ro # Read-only volume for genpro25 configuration
      - ./scripts:/workspace/scripts:ro # Read-only diagnostic scripts
    environment:
      RADAR_NAME: "RMA1"
      STREAM_LOG_LEVEL: "DEBUG" # debug, info, etc...
      GENPRO25_CONFIG: "/workspace/app/genpro25.yml"
      ROOT_CACHE_PATH: "/workspace/app/cache"
      ROOT_RADAR_FILES_PATH: "/workspace/app/data/radares"
      ROOT_RADAR_PRODUCTS_PATH: "/workspace/app/product_output"
      ROOT_TOPS_AND_CORES_PATH: "/workspace/app/tops_and_cores"
      ROOT_GATE_COORDS_PATH: "/workspace/app/data/gate_coordinates"
      ROOT_LOGS_PATH: "/workspace/app/logs"
      ROOT_GEOMETRY_PATH: "/workspace/app/data/geometries"
      ROI_PARAMS_VOL01: "{\"res_xy\": 1000, \"res_z\": 600, \"toa\": 15000, \"hfac\": 1.0, \"nb\": 1.3, \"bsp\": 1.1, \"min_radius\": 900.0}"
      ROI_PARAMS_VOL02: "{\"res_xy\": 1000, \"res_z\": 600, \"toa\": 15000, \"hfac\": 1.1, \"nb\": 1.6, \"bsp\": 1.3, \"min_radius\": 900.0}"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    working_dir: /workspace/app
    command: [ "bash", "-c", "mkdir -p /workspace/app/product_output && python main.py" ]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M
    healthcheck:
      test: [ "CMD", "python", "-c", "import psutil, sys; p = psutil.Process(); rss = p.memory_info().rss / 1024**3; sys.exit(0 if rss < 2.8 else 1)" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

