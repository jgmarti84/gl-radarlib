name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (set to "true" to run)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "$HOME/.cache/pip"

jobs:
  devcontainer_tests:
    name: Devcontainer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build devcontainer image
        run: docker build -f .devcontainer/Dockerfile -t radarlib-dev:ci .
      - name: Run pre-commit inside container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace radarlib-dev:ci bash -lc "\
            if [ ! -d .git ]; then git init && git add . && git commit -m 'ci: temp commit' || true; fi && \
            pre-commit run --all-files --show-diff-on-failure --color always || true"
      - name: Run unit tests inside container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace radarlib-dev:ci bash -lc "pytest -q -m \"not integration\" --junitxml=/workspace/report-unit-devcontainer.xml"
      - name: Upload devcontainer unit test report
        uses: actions/upload-artifact@v4
        with:
          name: report-unit-devcontainer.xml
          path: report-unit-devcontainer.xml

  devcontainer_integration:
    name: Devcontainer Integration Tests
    runs-on: ubuntu-latest
    needs: devcontainer_tests
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true') || vars.RUN_INTEGRATION == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build devcontainer image
        run: docker build -f .devcontainer/Dockerfile -t radarlib-dev:ci .
      - name: Run integration tests inside container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace radarlib-dev:ci bash -lc "pytest -q -m integration --junitxml=/workspace/report-integration-devcontainer.xml"
      - name: Upload devcontainer integration test report
        uses: actions/upload-artifact@v4
        with:
          name: report-integration-devcontainer.xml
          path: report-integration-devcontainer.xml
